<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <link rel="icon" type="image/jpeg" href="img/icon/dice.png">
    <title>JinKamp Randomizer</title>
    <meta property="og:title" content="JinKamp Randomizer">
    <meta property="og:description" content="Bereken willekeurig de zitplaatsen voor het JinKamp van 2026!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://woutaerts.github.io/jinkamp-randomizer/img/og/og-image-transparent.png">
    <meta property="og:url" content="https://woutaerts.github.io/jinkamp-randomizer/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <header class="app-header">
        <h1 class="app-title">JinKamp <span class="title-accent">Randomizer</span></h1>
        <p class="header-sub">Klik hieronder om de passagiers willekeurig te verdelen</p>

        <button class="randomize-btn" id="randomizeBtn">
            <span class="btn-dice">🎲</span>
            <span class="btn-label">Randomize</span>
        </button>
    </header>

    <main class="vehicles-grid is-randomizing" id="vehiclesGrid">
    </main>

    <!-- Share section — sits below the seating overview -->
    <div class="share-row">
        <button class="share-btn" id="shareBtn">
            <!--
                Icon switches depending on platform at runtime (JS adds a class):
                  .share-btn--share  → native share arrow  (mobile)
                  .share-btn--copy   → clipboard icon       (desktop)
                Both icons are in the markup; CSS shows only the active one.
            -->
            <svg class="icon icon--share" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
            <svg class="icon icon--copy" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span class="share-btn-label" id="shareBtnLabel">Deel indeling</span>
        </button>

        <!-- Brief confirmation toast -->
        <div class="share-toast" id="shareToast" aria-live="polite"></div>
    </div>

</div>

<!-- html2canvas renders the live DOM (car images + overlaid names) to a PNG canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
